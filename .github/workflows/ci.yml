---
name: CI
'on':
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 5 * * 0"

defaults:
  run:
    working-directory: ansible_collections/lowess/lab110

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4
        with:
          path: ansible_collections/lowess/lab110

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: pip3 install yamllint ansible-core ansible-lint

      - name: Lint code
        run: |
          yamllint .
          ansible-lint

  integration:
    name: Integration
    runs-on: ubuntu-latest

    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4
        with:
          path: ansible_collections/lowess/lab110

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: pip3 install ansible-core

      - name: Set up the test environment
        run: |
          cp tests/ansible.cfg ./ansible.cfg
          cp tests/inventory ./inventory

      - name: Test the playbook syntax
        run: ansible-playbook tests/test.yml --syntax-check

      - name: Test the playbook
        run: ansible-playbook tests/test.yml
        env:
          ANSIBLE_FORCE_COLOR: "1"

      - name: Idempotence check
        run: |
          idempotence=$(mktemp)
          ansible-playbook tests/test.yml | tee -a "${idempotence}"
          tail "${idempotence}" | grep -q 'changed=0.*failed=0' && (echo 'Idempotence test: pass' && exit 0) || (echo 'Idempotence test: fail' && exit 1)
        env:
          ANSIBLE_FORCE_COLOR: "1"
